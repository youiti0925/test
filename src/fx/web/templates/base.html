<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}FX Bot{% endblock %}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            mono: ['ui-monospace', 'SFMono-Regular', 'Menlo', 'monospace'],
          },
        },
      },
    }
  </script>
  <style>
    body { background: #0b1220; color: #e5e7eb; }
    .card { background: #121a2e; border: 1px solid #1f2a44; border-radius: 0.75rem; }
    .pulse-dot {
      width: 8px; height: 8px; border-radius: 50%;
      animation: pulse 1.2s infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.35; }
    }
  </style>
</head>
<body class="font-sans">
  <nav class="border-b border-slate-800 bg-slate-950/80 backdrop-blur sticky top-0 z-10">
    <div class="max-w-6xl mx-auto px-6 py-4 flex items-center justify-between">
      <a href="/" class="text-xl font-bold tracking-tight">
        <span class="text-emerald-400">fx</span><span class="text-slate-300">/bot</span>
      </a>
      <div class="flex gap-6 text-sm">
        <a href="/" class="hover:text-emerald-400">Dashboard</a>
        <a href="/analyze" class="hover:text-emerald-400">Analyze</a>
        <a href="/predictions" class="hover:text-emerald-400">Predictions</a>
        <a href="/lessons" class="hover:text-emerald-400">Lessons</a>
      </div>
    </div>
  </nav>
  <main class="max-w-6xl mx-auto px-6 py-8">
    {% block content %}{% endblock %}
  </main>
</body>
</html>
